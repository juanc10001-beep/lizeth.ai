<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hello Lizeth.ai</title>
  <style>
    :root {
      --bg: #f5fbff;
      --panel: #ffffff;
      --ink: #213044;
      --muted: #5d6b80;
      --blue: #3d7ef0;
      --green: #25a76f;
      --lila: #8b6ee8;
      --yellow: #ffd96a;
      --soft-blue: #dfeeff;
      --soft-green: #e2f7ee;
      --soft-lila: #eee9ff;
      --danger-soft: #fff0d7;
      --line: #d9e5f2;
      --shadow: 0 18px 45px rgba(42, 74, 115, .12);
      --button-min: 76px;
      --radius: 22px;
      --scan: #ffbf2f;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      letter-spacing: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible {
      outline: 5px solid var(--yellow);
      outline-offset: 3px;
    }

    .app {
      width: min(1180px, 100%);
      min-height: 100vh;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      background: rgba(255,255,255,.82);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(49, 90, 130, .08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .avatar {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--soft-blue), var(--soft-lila));
      font-size: 30px;
      border: 1px solid var(--line);
      flex: 0 0 auto;
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-size: clamp(30px, 5vw, 58px);
      line-height: 1;
      letter-spacing: 0;
    }

    h2 {
      font-size: clamp(26px, 3.6vw, 44px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    h3 {
      font-size: clamp(22px, 2.6vw, 32px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle, .muted {
      color: var(--muted);
      line-height: 1.45;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .screen {
      display: none;
      flex: 1;
      animation: fade .18s ease-out;
    }

    .screen.active {
      display: block;
    }

    @keyframes fade {
      from { opacity: .45; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(18px, 3vw, 34px);
    }

    .hero {
      min-height: calc(100vh - 154px);
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      align-items: center;
      gap: 24px;
    }

    .hero-copy {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .welcome {
      font-size: clamp(22px, 3vw, 36px);
      line-height: 1.28;
      max-width: 760px;
    }

    .assistant-card {
      display: grid;
      place-items: center;
      min-height: 420px;
      background: linear-gradient(150deg, #ffffff 0%, #ecf7ff 48%, #f0edff 100%);
      border-radius: var(--radius);
      border: 1px solid var(--line);
      text-align: center;
      padding: 28px;
    }

    .assistant-face {
      width: min(310px, 74vw);
      aspect-ratio: 1;
      border-radius: 40px;
      display: grid;
      place-items: center;
      background: #fff;
      border: 2px solid #d6e6f7;
      box-shadow: inset 0 0 0 18px #f4fbff, 0 18px 50px rgba(53, 94, 150, .16);
      font-size: 92px;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      min-height: var(--button-min);
      padding: 18px 22px;
      border-radius: 20px;
      background: var(--blue);
      color: #fff;
      font-weight: 800;
      font-size: clamp(20px, 2.2vw, 28px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-align: center;
      box-shadow: 0 10px 20px rgba(61, 126, 240, .2);
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
      flex: 1 1 230px;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(1px) scale(.99); }

    .btn.secondary {
      background: var(--soft-blue);
      color: var(--ink);
      box-shadow: none;
      border: 1px solid #bfd6f2;
    }

    .btn.green {
      background: var(--green);
      box-shadow: 0 10px 20px rgba(37, 167, 111, .16);
    }

    .btn.lila {
      background: var(--lila);
      box-shadow: 0 10px 20px rgba(139, 110, 232, .16);
    }

    .btn.yellow {
      background: var(--yellow);
      color: #243040;
      box-shadow: none;
    }

    .btn.small {
      min-height: 54px;
      flex: 0 1 auto;
      font-size: 17px;
      padding: 12px 16px;
      border-radius: 15px;
      font-weight: 800;
    }

    .btn.disabled,
    .btn:disabled {
      opacity: .52;
      cursor: not-allowed;
      transform: none;
    }

    .topic-card, .choice-card, .conversation-card {
      min-height: 150px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #fff;
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 12px;
      box-shadow: 0 10px 28px rgba(49, 90, 130, .07);
    }

    .topic-card.ready {
      background: linear-gradient(140deg, #fff, var(--soft-green));
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      align-self: flex-start;
      background: var(--soft-lila);
      color: #3f3376;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 15px;
    }

    .video-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--line);
      background: #dfeeff;
    }

    iframe {
      width: 100%;
      height: 100%;
      display: block;
      border: 0;
    }

    .learn-card {
      min-height: 420px;
      display: grid;
      align-content: center;
      justify-items: center;
      text-align: center;
      gap: 22px;
      background: linear-gradient(150deg, #ffffff, #eff8ff);
    }

    .phrase {
      font-size: clamp(44px, 8vw, 92px);
      font-weight: 900;
      line-height: 1.02;
      letter-spacing: 0;
    }

    .translation {
      font-size: clamp(23px, 3vw, 36px);
      color: var(--muted);
      font-weight: 700;
    }

    .activity-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .question {
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 900;
      line-height: 1.14;
      margin: 16px 0;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    .choice {
      min-height: calc(var(--button-min) + 34px);
      border-radius: 20px;
      background: #fff;
      border: 3px solid var(--line);
      color: var(--ink);
      font-size: clamp(24px, 3vw, 38px);
      font-weight: 900;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(49, 90, 130, .07);
    }

    .choice.scan-highlight {
      border-color: var(--scan);
      background: #fff7d8;
      box-shadow: 0 0 0 8px rgba(255, 191, 47, .25);
      transform: scale(1.02);
    }

    .feedback {
      min-height: 58px;
      margin-top: 16px;
      font-size: clamp(22px, 2.6vw, 34px);
      font-weight: 900;
      color: var(--green);
    }

    .scan-panel {
      margin-top: 18px;
      padding: 16px;
      border-radius: 18px;
      background: #fffaf0;
      border: 1px solid #f1d187;
    }

    .select-highlight {
      width: 100%;
      min-height: 104px;
      margin-top: 12px;
      font-size: clamp(24px, 3vw, 40px);
    }

    .conversation-layout {
      display: grid;
      grid-template-columns: .88fr 1.12fr;
      gap: 18px;
    }

    .scene {
      min-height: 360px;
      display: grid;
      place-items: center;
      text-align: center;
      background: linear-gradient(145deg, #ffffff, #f2f8ff);
    }

    .scene-emoji {
      font-size: clamp(92px, 14vw, 180px);
      line-height: 1;
      margin-bottom: 12px;
    }

    .ai-line {
      background: var(--soft-blue);
      border: 1px solid #bdd5f2;
      padding: 18px;
      border-radius: 20px;
      font-size: clamp(26px, 3.4vw, 42px);
      font-weight: 900;
      line-height: 1.14;
    }

    .stars {
      font-size: clamp(54px, 10vw, 116px);
      line-height: 1;
      text-align: center;
      margin: 20px 0;
    }

    .progressbar {
      height: 26px;
      background: #e7eef8;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line);
      min-width: min(100%, 360px);
    }

    .progressbar span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--green), var(--blue));
      border-radius: inherit;
      transition: width .25s ease;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-weight: 800;
      font-size: 18px;
    }

    input, textarea, select {
      width: 100%;
      min-height: 56px;
      border: 2px solid var(--line);
      border-radius: 16px;
      padding: 12px 14px;
      background: #fff;
      color: var(--ink);
      font-size: 19px;
    }

    textarea { min-height: 110px; resize: vertical; }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 76px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      font-size: 20px;
      font-weight: 900;
    }

    .switch-row input {
      width: 30px;
      height: 30px;
      min-height: 30px;
      flex: 0 0 auto;
    }

    .high-contrast {
      --bg: #f8fbff;
      --panel: #ffffff;
      --ink: #071421;
      --muted: #253548;
      --line: #35475b;
      --soft-blue: #d3e8ff;
      --soft-green: #d5f2e4;
      --soft-lila: #e2d9ff;
    }

    .extra-large {
      --button-min: 96px;
    }

    .status {
      min-height: 42px;
      color: var(--muted);
      font-size: 18px;
      font-weight: 800;
    }

    @media (max-width: 820px) {
      .app { padding: 12px; }
      header { align-items: flex-start; }
      .hero, .conversation-layout { grid-template-columns: 1fr; }
      .assistant-card { min-height: 280px; }
      .grid.two, .grid.three { grid-template-columns: 1fr; }
      .top-actions { width: 100%; justify-content: stretch; }
      .top-actions .btn.small { flex: 1 1 130px; }
      .activity-head { flex-direction: column; }
      .choice { min-height: 96px; }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <header>
      <div class="brand">
        <div class="avatar" aria-hidden="true">AI</div>
        <div>
          <strong>Hello Lizeth.ai</strong>
          <p class="subtitle">Your English friend</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="btn small secondary" data-go="home">Home</button>
        <button class="btn small secondary" data-go="topics">Topics</button>
        <button class="btn small secondary" data-go="accessibility">Accessibility</button>
      </div>
    </header>

    <section class="screen active" id="home">
      <div class="panel hero">
        <div class="hero-copy">
          <div class="badge">Friendly AI assistant</div>
          <h1>Hello Lizeth.ai</h1>
          <p class="subtitle" style="font-size: clamp(24px, 3vw, 38px); font-weight: 800;">Your English friend</p>
          <p class="welcome">Hello Lizeth! I am ready to learn with you.</p>
          <p class="welcome">Hola Lizeth, estoy lista para aprender contigo.</p>
          <div class="grid two">
            <button class="btn green" id="startBtn">Start</button>
            <button class="btn" data-go="topics">Topics</button>
            <button class="btn lila" id="continueBtn">Continue</button>
            <button class="btn secondary" data-go="accessibility">Accessibility</button>
            <button class="btn yellow" data-go="teacher">Teacher Mode</button>
          </div>
        </div>
        <div class="assistant-card" aria-label="AI assistant">
          <div>
            <div class="assistant-face" aria-hidden="true">😊</div>
            <p class="subtitle" style="margin-top: 18px; font-size: 22px; font-weight: 800;">I am here with you.</p>
          </div>
        </div>
      </div>
    </section>

    <section class="screen" id="topics"></section>
    <section class="screen" id="topic"></section>
    <section class="screen" id="watch"></section>
    <section class="screen" id="learn"></section>
    <section class="screen" id="practice"></section>
    <section class="screen" id="conversationMenu"></section>
    <section class="screen" id="conversation"></section>
    <section class="screen" id="review"></section>
    <section class="screen" id="accessibility"></section>
    <section class="screen" id="teacher"></section>
  </main>

  <script>
    const STORE_KEYS = {
      settings: "helloLizethSettings",
      progress: "helloLizethProgress",
      content: "helloLizethContent"
    };

    const defaultSettings = {
      autoScan: false,
      scanSpeed: "medium",
      autoVoice: true,
      buttonSize: "large",
      contrast: "normal",
      supportLanguage: "spanish",
      englishVoice: "",
      spanishVoice: "",
      englishRate: 0.7,
      spanishRate: 0.82,
      voicePitch: 1,
      recordedVoice: true
    };

    const defaultProgress = {
      greetingsSeen: [],
      practicesDone: [],
      conversationsCompleted: [],
      lastModule: "home"
    };

    const defaultContent = {
      videoUrl: "https://www.youtube-nocookie.com/embed/2o46gKeQTwc?rel=0&playsinline=1",
      greetings: [
        { en: "Hello", es: "Hola" },
        { en: "Hi", es: "Hola" },
        { en: "Good morning", es: "Buenos dias" },
        { en: "Good afternoon", es: "Buenas tardes" },
        { en: "Good night", es: "Buenas noches" },
        { en: "How are you?", es: "Como estas?" },
        { en: "I am fine.", es: "Estoy bien." },
        { en: "I am happy.", es: "Estoy feliz." },
        { en: "I am sad.", es: "Estoy triste." },
        { en: "Goodbye.", es: "Adios." },
        { en: "See you.", es: "Nos vemos." }
      ],
      practiceQuestions: [
        { q: 'How do you say "hola"?', options: ["Hello", "Goodbye"], answer: "Hello" },
        { q: 'How do you say "buenos dias"?', options: ["Good morning", "Good night"], answer: "Good morning" },
        { q: 'How do you answer "How are you?"', options: ["I am fine.", "Goodbye."], answer: "I am fine." },
        { q: "Choose a goodbye.", options: ["See you.", "Good morning."], answer: "See you." }
      ]
    };

    const topics = [
      { id: "greetings", name: "Greetings", icon: "👋", ready: true },
      { id: "colors", name: "Colors", icon: "🎨", ready: false },
      { id: "animals", name: "Animals", icon: "🐾", ready: false },
      { id: "emotions", name: "Emotions", icon: "🙂", ready: false },
      { id: "school", name: "School objects", icon: "✏️", ready: false },
      { id: "commands", name: "Commands", icon: "👉", ready: false }
    ];

    const conversations = [
      {
        id: "school",
        title: "Conversation 1 - At School",
        context: "Lizeth arrives at school.",
        scene: "🏫",
        turns: [
          { ai: "Hello, Lizeth!", answers: ["Hello, teacher."] },
          { ai: "How are you today?", answers: ["I am fine.", "I am happy.", "I am sad."] },
          { ai: "Great! Let's learn English.", answers: ["Yes.", "Okay."] },
          { ai: "Goodbye, Lizeth.", answers: ["Goodbye.", "See you."] }
        ]
      },
      {
        id: "morning",
        title: "Conversation 2 - Morning Routine",
        context: "In the morning.",
        scene: "☀️",
        turns: [
          { ai: "Good morning, Lizeth.", answers: ["Good morning."] },
          { ai: "Are you ready?", answers: ["Yes.", "No."] },
          { ai: "Let's say hello.", answers: ["Hello."] },
          { ai: "Very good!", answers: ["Thank you."] }
        ]
      },
      {
        id: "friend",
        title: "Conversation 3 - With a Friend",
        context: "A friend says hello to Lizeth.",
        scene: "👧",
        turns: [
          { ai: "Hi, Lizeth!", answers: ["Hi."] },
          { ai: "How are you?", answers: ["I am fine.", "I am happy.", "I am sad."] },
          { ai: "Nice to see you.", answers: ["Nice to see you."] },
          { ai: "See you later.", answers: ["See you."] }
        ]
      },
      {
        id: "home",
        title: "Conversation 4 - At Home",
        context: "At home.",
        scene: "🏠",
        turns: [
          { ai: "Good afternoon, Lizeth.", answers: ["Good afternoon."] },
          { ai: "How are you?", answers: ["I am fine.", "I am happy.", "I am sad."] },
          { ai: "Do you want to practice English?", answers: ["Yes.", "No."] },
          { ai: "Great job, Lizeth.", answers: ["Thank you."] }
        ]
      },
      {
        id: "night",
        title: "Conversation 5 - Night Time",
        context: "Night time.",
        scene: "🌙",
        turns: [
          { ai: "Good night, Lizeth.", answers: ["Good night."] },
          { ai: "Are you tired?", answers: ["Yes.", "No."] },
          { ai: "It's time to rest.", answers: ["Okay."] },
          { ai: "See you tomorrow.", answers: ["See you."] }
        ]
      },
      {
        id: "goodbye",
        title: "Conversation 6 - Saying Goodbye",
        context: "Leaving school.",
        scene: "🚌",
        turns: [
          { ai: "Goodbye, Lizeth.", answers: ["Goodbye."] },
          { ai: "See you later.", answers: ["See you."] },
          { ai: "Have a nice day.", answers: ["Thank you."] },
          { ai: "You did great today.", answers: ["Thank you."] }
        ]
      }
    ];

    let settings = load(STORE_KEYS.settings, defaultSettings);
    let progress = load(STORE_KEYS.progress, defaultProgress);
    let content = load(STORE_KEYS.content, defaultContent);
    if (!content.videoUrl || content.videoUrl.includes("2o46gKeQTwc") || content.videoUrl.includes("youtube.com/embed/")) {
      content.videoUrl = defaultContent.videoUrl;
      save(STORE_KEYS.content, content);
    }
    let learnIndex = 0;
    let practiceIndex = 0;
    let currentConversation = null;
    let conversationTurn = 0;
    let scanTimer = null;
    let scanIndex = -1;
    let currentChoices = [];
    let currentChoiceHandler = null;
    let recognition = null;
    let availableVoices = [];

    const app = document.getElementById("app");
    const screens = Array.from(document.querySelectorAll(".screen"));
    const positive = ["Very good, Lizeth!", "Great job!", "Excellent!", "You are doing amazing!"];
    const gentle = ["That's okay, let's try again.", "Listen again, Lizeth.", "I am here with you."];
    const recordedAudio = {
      en: {
        "hello lizeth i am ready to learn with you": "audio/welcome-en.mp3",
        "hello": "audio/hello.mp3",
        "hi": "audio/hi.mp3",
        "good morning": "audio/good-morning.mp3",
        "very good lizeth": "audio/very-good.mp3",
        "very good": "audio/very-good.mp3"
      },
      es: {
        "hola lizeth estoy lista para aprender contigo": "audio/welcome-es.mp3"
      }
    };

    function deepCopy(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function load(key, fallback) {
      try {
        const saved = localStorage.getItem(key);
        return saved ? { ...deepCopy(fallback), ...JSON.parse(saved) } : deepCopy(fallback);
      } catch (error) {
        return deepCopy(fallback);
      }
    }

    function save(key, value) {
      try { localStorage.setItem(key, JSON.stringify(value)); } catch (error) {}
    }

    function markLast(module) {
      progress.lastModule = module;
      save(STORE_KEYS.progress, progress);
    }

    function show(id) {
      stopScan();
      screens.forEach(screen => screen.classList.toggle("active", screen.id === id));
      markLast(id);
      window.scrollTo({ top: 0, behavior: "smooth" });
      if (id === "topics") renderTopics();
      if (id === "topic") renderTopic();
      if (id === "watch") renderWatch();
      if (id === "learn") renderLearn();
      if (id === "practice") renderPractice();
      if (id === "conversationMenu") renderConversationMenu();
      if (id === "review") renderReview();
      if (id === "accessibility") renderAccessibility();
      if (id === "teacher") renderTeacher();
    }

    function refreshVoices() {
      if (!("speechSynthesis" in window)) return [];
      availableVoices = window.speechSynthesis.getVoices() || [];
      return availableVoices;
    }

    function voiceLabel(voice) {
      return `${voice.name} (${voice.lang})${voice.localService ? "" : " online"}`;
    }

    function findVoice(savedName, lang) {
      refreshVoices();
      if (!availableVoices.length) return null;
      if (savedName) {
        const saved = availableVoices.find(voice => voice.name === savedName);
        if (saved) return saved;
      }

      const languageVoices = availableVoices.filter(voice => voice.lang.toLowerCase().startsWith(lang.toLowerCase().slice(0, 2)));
      const preferredNames = [
        "Google US English",
        "Microsoft Jenny",
        "Microsoft Aria",
        "Microsoft Zira",
        "Google español",
        "Microsoft Helena",
        "Microsoft Sabina"
      ];

      for (const preferred of preferredNames) {
        const match = languageVoices.find(voice => voice.name.toLowerCase().includes(preferred.toLowerCase()));
        if (match) return match;
      }

      return languageVoices.find(voice => voice.default) || languageVoices[0] || null;
    }

    function makeUtterance(text, lang, savedVoice, rate) {
      const utterance = new SpeechSynthesisUtterance(text);
      const voice = findVoice(savedVoice, lang);
      utterance.lang = voice ? voice.lang : lang;
      utterance.voice = voice;
      utterance.rate = Number(rate) || 0.75;
      utterance.pitch = Number(settings.voicePitch) || 1;
      utterance.volume = 0.92;
      return utterance;
    }

    async function playRecordedAudio(src) {
      if (!settings.recordedVoice || !src) return false;
      try {
        if ("speechSynthesis" in window) window.speechSynthesis.cancel();
        const audio = new Audio(src);
        audio.preload = "auto";
        await audio.play();
        await new Promise(resolve => {
          audio.onended = resolve;
          audio.onerror = resolve;
        });
        return true;
      } catch (error) {
        return false;
      }
    }

    function recordedSource(text, language) {
      const library = recordedAudio[language] || {};
      return library[normalize(text)] || "";
    }

    async function speak(text, lang, rate, savedVoice) {
      if (!settings.autoVoice) return;
      const language = lang.toLowerCase().startsWith("es") ? "es" : "en";
      if (await playRecordedAudio(recordedSource(text, language))) return;
      if (!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const utterance = makeUtterance(text, lang, savedVoice, rate);
      window.speechSynthesis.speak(utterance);
    }

    function speakEnglish(text) {
      speak(text, "en-US", settings.englishRate, settings.englishVoice);
    }

    function speakSpanish(text) {
      speak(text, "es-CO", settings.spanishRate, settings.spanishVoice);
    }

    async function speakAssistant(textEnglish, textSpanish) {
      if (!settings.autoVoice) return;
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      const playedEnglish = await playRecordedAudio(recordedSource(textEnglish, "en"));
      const playedSpanish = await playRecordedAudio(recordedSource(textSpanish, "es"));
      if (playedEnglish || playedSpanish) {
        if (!playedEnglish) speakEnglish(textEnglish);
        if (!playedSpanish) speakSpanish(textSpanish);
        return;
      }
      if (!("speechSynthesis" in window)) return;
      const first = makeUtterance(textEnglish, "en-US", settings.englishVoice, settings.englishRate);
      const second = makeUtterance(textSpanish, "es-CO", settings.spanishVoice, settings.spanishRate);
      first.onend = () => window.speechSynthesis.speak(second);
      window.speechSynthesis.speak(first);
    }

      const conv = conversations.length ? progress.conversationsCompleted.length / conversations.length : 0;

      return 3000;

      speakEnglish(currentChoices[scanIndex].dataset.answer || currentChoices[scanIndex].textContent);

      if (scanTimer) clearInterval(scanTimer);
      scanTimer = null;
      currentChoices.forEach(btn => btn.classList.remove("scan-highlight"));
    }

            <p class="subtitle">Changes are saved on this device.</p>
          </div>
          <label>Main video link
            <input id="teacherVideo" value="${escapeAttr(content.videoUrl)}">
          </label>
          <div class="grid two">
            <label>Practice question
              <textarea id="teacherQuestion">${escapeHtml(first.q)}</textarea>
            </label>
            <label>Options, one per line
              <textarea id="teacherOptions">${escapeHtml(first.options.join("\n"))}</textarea>
            </label>
          </div>
          <label>Correct answer
            <input id="teacherAnswer" value="${escapeAttr(first.answer)}">
          </label>
          <div class="grid two">
            <label>New greeting in English
              <input id="newGreetingEn" placeholder="Example: Thank you">
            </label>
            <label>Spanish meaning
              <input id="newGreetingEs" placeholder="Example: Gracias">
            </label>
          </div>
          <div class="grid three">
            <button class="btn green" id="saveTeacher">Save changes</button>
            <button class="btn lila" id="addGreeting">Add greeting</button>
            <button class="btn yellow" id="resetProgress">Reset progress</button>
          </div>
          <p class="status" id="teacherStatus"></p>
          <button class="btn secondary" data-go="home">Back home</button>
        </div>
      `;
      document.getElementById("saveTeacher").addEventListener("click", () => {
        const options = document.getElementById("teacherOptions").value.split("\n").map(x => x.trim()).filter(Boolean);
        content.videoUrl = toEmbedUrl(document.getElementById("teacherVideo").value.trim());
        content.practiceQuestions[0] = {
          q: document.getElementById("teacherQuestion").value.trim() || first.q,
          options: options.length ? options : first.options,
          answer: document.getElementById("teacherAnswer").value.trim() || first.answer
        };
        save(STORE_KEYS.content, content);
        document.getElementById("teacherStatus").textContent = "Changes saved.";
        speakEnglish("Changes saved.");
      });
      document.getElementById("addGreeting").addEventListener("click", () => {
        const en = document.getElementById("newGreetingEn").value.trim();
        const es = document.getElementById("newGreetingEs").value.trim();
        if (!en || !es) {
          document.getElementById("teacherStatus").textContent = "Please write the greeting and the meaning.";
          return;
        }
        content.greetings.push({ en, es });
        save(STORE_KEYS.content, content);
        document.getElementById("teacherStatus").textContent = "Greeting added.";
        speakEnglish("Greeting added.");
      });
      document.getElementById("resetProgress").addEventListener("click", () => {
        progress = deepCopy(defaultProgress);
        save(STORE_KEYS.progress, progress);
        document.getElementById("teacherStatus").textContent = "Progress reset.";
        speakEnglish("Progress reset.");
      });
    }

    function listenForVoice(callback, statusId) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const status = document.getElementById(statusId);
      if (!SpeechRecognition) {
        status.textContent = "Voice mode is not available in this browser. You can use big buttons.";
        speakEnglish("Voice mode is not available in this browser. You can use big buttons.");
        return;
      }
      try {
        if (recognition) recognition.stop();
        recognition = new SpeechRecognition();
        recognition.lang = "en-US";
        recognition.interimResults = false;
        recognition.maxAlternatives = 3;
        status.textContent = "Listening...";
        recognition.onresult = event => {
          const heard = Array.from(event.results[0]).map(result => result.transcript).join(" ");
          status.textContent = "I heard: " + heard;
          callback(heard);
        };
        recognition.onerror = () => {
          status.textContent = "That's okay. You can use big buttons.";
          speakEnglish("That's okay. You can use big buttons.");
        };
        recognition.start();
      } catch (error) {
        status.textContent = "Voice mode is not available in this browser. You can use big buttons.";
      }
    }

    function isMatch(value, expected) {
      const cleanValue = normalize(value);
      const cleanExpected = normalize(expected);
      if (cleanValue === cleanExpected) return true;
      return cleanValue.includes(cleanExpected) || cleanExpected.includes(cleanValue);
    }

    function normalize(text) {
      return String(text || "")
        .toLowerCase()
        .replace(/[.,!?]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function addUnique(list, value) {
      if (!list.includes(value)) list.push(value);
    }

    function random(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("\n", " ");
    }

    function toEmbedUrl(url) {
      if (!url) return defaultContent.videoUrl;
      try {
        const embeddedId = getYouTubeId(url);
        if (embeddedId) return "https://www.youtube-nocookie.com/embed/" + encodeURIComponent(embeddedId) + "?rel=0&playsinline=1";
        const parsed = new URL(url);
        const id = parsed.searchParams.get("v");
        if (id) return "https://www.youtube-nocookie.com/embed/" + encodeURIComponent(id) + "?rel=0&playsinline=1";
      } catch (error) {}
      return url;
    }

    function getYouTubeId(url) {
      try {
        const parsed = new URL(url);
        if (parsed.hostname.includes("youtu.be")) {
          return parsed.pathname.split("/").filter(Boolean)[0] || "";
        }
        if (parsed.pathname.includes("/embed/")) {
          return parsed.pathname.split("/embed/")[1].split("/")[0] || "";
        }
        return parsed.searchParams.get("v") || "";
      } catch (error) {
        return "";
      }
    }

    function applySettings() {
      document.body.classList.toggle("high-contrast", settings.contrast === "high");
      document.body.classList.toggle("extra-large", settings.buttonSize === "extra-large");
    }

    document.addEventListener("click", event => {
      const target = event.target.closest("[data-go]");
      if (target) show(target.dataset.go);
    });

    document.getElementById("startBtn").addEventListener("click", () => show("watch"));
    document.getElementById("continueBtn").addEventListener("click", () => show(progress.lastModule || "topic"));

    applySettings();
    setupVoiceLoading();
    setTimeout(() => {
      speakAssistant("Hello Lizeth! I am ready to learn with you.", "Hola Lizeth, estoy lista para aprender contigo.");
    }, 650);
  </script>
</body>
</html>
