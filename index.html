<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hello Lizeth.ai</title>
  <link rel="icon" type="image/png" href="assets/avatar.png">
  <link rel="apple-touch-icon" href="assets/avatar.png">
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: rgba(255, 255, 255, .82);
      --ink: #1d1d1f;
      --muted: #6e7380;
      --blue: #007aff;
      --green: #34c759;
      --lila: #af52de;
      --yellow: #ffd60a;
      --soft-blue: #eaf4ff;
      --soft-green: #e9f8ef;
      --soft-lila: #f4edff;
      --danger-soft: #fff0d7;
      --line: rgba(80, 93, 120, .16);
      --shadow: 0 22px 60px rgba(31, 35, 45, .10);
      --button-min: 76px;
      --radius: 24px;
      --scan: #ffbf2f;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        linear-gradient(135deg, rgba(255,255,255,.95), rgba(242,246,255,.88) 42%, rgba(250,245,255,.9)),
        var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Arial, Helvetica, sans-serif;
      letter-spacing: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible {
      outline: 5px solid var(--yellow);
      outline-offset: 3px;
    }

    .app {
      width: min(1180px, 100%);
      min-height: 100vh;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      background: rgba(255,255,255,.72);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 12px 40px rgba(31, 35, 45, .08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .avatar {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--soft-blue), var(--soft-lila));
      font-size: 30px;
      border: 1px solid var(--line);
      color: var(--blue);
      font-weight: 900;
      flex: 0 0 auto;
      overflow: hidden;
      padding: 0;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-size: clamp(30px, 5vw, 58px);
      line-height: 1;
      letter-spacing: 0;
    }

    h2 {
      font-size: clamp(26px, 3.6vw, 44px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    h3 {
      font-size: clamp(22px, 2.6vw, 32px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle, .muted {
      color: var(--muted);
      line-height: 1.45;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .screen {
      display: none;
      flex: 1;
      animation: fade .18s ease-out;
    }

    .screen.active {
      display: block;
    }

    @keyframes fade {
      from { opacity: .45; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(18px, 3vw, 34px);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .hero {
      min-height: calc(100vh - 154px);
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      align-items: center;
      gap: 24px;
    }

    .hero-copy {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .welcome {
      font-size: clamp(22px, 3vw, 36px);
      line-height: 1.28;
      max-width: 760px;
    }

    .assistant-card {
      display: grid;
      place-items: center;
      min-height: 420px;
      background: linear-gradient(150deg, rgba(255,255,255,.92) 0%, rgba(234,244,255,.88) 48%, rgba(246,240,255,.86) 100%);
      border-radius: var(--radius);
      border: 1px solid var(--line);
      text-align: center;
      padding: 28px;
    }

    .assistant-face {
      width: min(310px, 74vw);
      aspect-ratio: 1;
      border-radius: 40px;
      display: grid;
      place-items: center;
      background: #fff;
      border: 2px solid #d6e6f7;
      box-shadow: inset 0 0 0 18px #f7fbff, 0 20px 55px rgba(31, 35, 45, .14);
      font-size: 92px;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      min-height: var(--button-min);
      padding: 18px 22px;
      border-radius: 20px;
      background: linear-gradient(180deg, #1b8cff, var(--blue));
      color: #fff;
      font-weight: 800;
      font-size: clamp(20px, 2.2vw, 28px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-align: center;
      box-shadow: 0 14px 28px rgba(0, 122, 255, .18);
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
      flex: 1 1 230px;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(1px) scale(.99); }

    .btn.secondary {
      background: var(--soft-blue);
      color: var(--ink);
      box-shadow: none;
      border: 1px solid var(--line);
    }

    .btn.green {
      background: linear-gradient(180deg, #45d56f, var(--green));
      box-shadow: 0 10px 20px rgba(37, 167, 111, .16);
    }

    .btn.lila {
      background: linear-gradient(180deg, #bf73ea, var(--lila));
      box-shadow: 0 10px 20px rgba(139, 110, 232, .16);
    }

    .btn.yellow {
      background: linear-gradient(180deg, #ffe27a, var(--yellow));
      color: #243040;
      box-shadow: none;
    }

    .btn.small {
      min-height: 54px;
      flex: 0 1 auto;
      font-size: 17px;
      padding: 12px 16px;
      border-radius: 15px;
      font-weight: 800;
    }

    .btn.disabled,
    .btn:disabled {
      opacity: .52;
      cursor: not-allowed;
      transform: none;
    }

    .topic-card, .choice-card, .conversation-card {
      min-height: 150px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.78);
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 12px;
      box-shadow: 0 12px 32px rgba(31, 35, 45, .08);
    }

    .topic-card.ready {
      background: linear-gradient(140deg, rgba(255,255,255,.96), rgba(233,248,239,.92));
    }

    .completed-card {
      opacity: .72;
      background: linear-gradient(140deg, rgba(255,255,255,.82), rgba(233,248,239,.78));
      cursor: default;
    }

    .completed-card h3::after {
      content: " - done";
      color: var(--green);
      font-size: .72em;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      align-self: flex-start;
      background: rgba(244, 237, 255, .9);
      color: #4b3f72;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 15px;
    }

    .video-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--line);
      background: linear-gradient(135deg, #edf4ff, #f6f0ff);
    }

    iframe {
      width: 100%;
      height: 100%;
      display: block;
      border: 0;
    }

    .learn-card {
      min-height: 420px;
      display: grid;
      align-content: center;
      justify-items: center;
      text-align: center;
      gap: 22px;
      background: linear-gradient(150deg, rgba(255,255,255,.96), rgba(239,248,255,.9));
    }

    .phrase {
      font-size: clamp(44px, 8vw, 92px);
      font-weight: 900;
      line-height: 1.02;
      letter-spacing: 0;
    }

    .translation {
      font-size: clamp(23px, 3vw, 36px);
      color: var(--muted);
      font-weight: 700;
    }

    .activity-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .question {
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 900;
      line-height: 1.14;
      margin: 16px 0;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    .choice {
      min-height: calc(var(--button-min) + 34px);
      border-radius: 20px;
      background: rgba(255,255,255,.9);
      border: 3px solid var(--line);
      color: var(--ink);
      font-size: clamp(24px, 3vw, 38px);
      font-weight: 900;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(31, 35, 45, .08);
    }

    .choice.visual-choice {
      font-size: clamp(54px, 8vw, 92px);
      line-height: 1;
      min-height: 140px;
    }

    .visual-label {
      display: block;
      margin-top: 10px;
      font-size: clamp(18px, 2vw, 26px);
      line-height: 1.1;
      color: var(--muted);
      font-weight: 900;
    }

    .reading-card {
      padding: clamp(18px, 3vw, 30px);
      border-radius: 22px;
      background: rgba(255,255,255,.9);
      border: 1px solid var(--line);
      font-size: clamp(26px, 3.2vw, 42px);
      line-height: 1.35;
      font-weight: 850;
      box-shadow: 0 12px 34px rgba(31, 35, 45, .08);
    }

    .sentence-builder {
      display: grid;
      gap: 18px;
    }

    .sentence-slots,
    .word-bank {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .sentence-slot {
      min-width: 150px;
      min-height: 78px;
      border-radius: 18px;
      border: 3px dashed #a9bdd8;
      background: rgba(234,244,255,.78);
      display: grid;
      place-items: center;
      padding: 14px;
      font-size: clamp(24px, 3vw, 38px);
      font-weight: 900;
    }

    .word-chip {
      min-height: 72px;
      padding: 16px 22px;
      border-radius: 18px;
      background: #fff;
      border: 2px solid var(--line);
      color: var(--ink);
      font-size: clamp(22px, 2.7vw, 34px);
      font-weight: 900;
      box-shadow: 0 10px 24px rgba(31, 35, 45, .08);
    }

    .word-chip.used {
      opacity: .42;
      pointer-events: none;
    }

    .choice.scan-highlight {
      border-color: var(--scan);
      background: #fff7d8;
      box-shadow: 0 0 0 8px rgba(255, 191, 47, .25);
      transform: scale(1.02);
    }

    .choice.incorrect-choice,
    .sentence-slot.incorrect-choice {
      border-color: #ff3b30;
      background: #fff0f0;
      color: #8a1212;
      box-shadow: 0 0 0 8px rgba(255, 59, 48, .14);
    }

    .choice.correct-choice,
    .sentence-slot.correct-choice {
      border-color: var(--green);
      background: #effaf3;
      box-shadow: 0 0 0 8px rgba(52, 199, 89, .13);
    }

    .color-gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      padding: 8px 0;
    }

    .mini-swatch {
      width: clamp(54px, 8vw, 88px);
      aspect-ratio: 1;
      border-radius: 18px;
      border: 3px solid var(--line);
      box-shadow: 0 12px 26px rgba(31, 35, 45, .10);
    }

    .color-learn-card {
      min-height: 460px;
      background:
        linear-gradient(150deg, rgba(255,255,255,.96), rgba(245,247,252,.9));
    }

    .color-sample {
      width: min(230px, 52vw);
      aspect-ratio: 1;
      border-radius: 42px;
      border: 4px solid var(--line);
      box-shadow: 0 24px 60px rgba(31, 35, 45, .16);
    }

    .color-choice {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 18px;
      text-align: left;
    }

    .choice-swatch {
      width: 72px;
      aspect-ratio: 1;
      border-radius: 18px;
      border: 3px solid var(--line);
      box-shadow: 0 10px 22px rgba(31, 35, 45, .12);
    }

    .feedback {
      min-height: 58px;
      margin-top: 16px;
      font-size: clamp(22px, 2.6vw, 34px);
      font-weight: 900;
      color: var(--green);
    }

    .scan-panel {
      margin-top: 18px;
      padding: 16px;
      border-radius: 18px;
      background: #fffaf0;
      border: 1px solid #f1d187;
    }

    .voice-recorder {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, .72);
      border: 1px solid var(--line);
      box-shadow: 0 10px 28px rgba(31, 35, 45, .06);
    }

    .name-display {
      min-height: 92px;
      padding: 18px 22px;
      border-radius: 20px;
      background: rgba(255,255,255,.9);
      border: 2px solid var(--line);
      font-size: clamp(34px, 6vw, 68px);
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      letter-spacing: 0;
    }

    .alphabet-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
      gap: 12px;
    }

    .letter-btn {
      min-height: 74px;
      border-radius: 18px;
      background: rgba(234, 244, 255, .96);
      border: 1px solid var(--line);
      color: var(--ink);
      font-size: clamp(24px, 3vw, 36px);
      font-weight: 900;
      box-shadow: 0 10px 24px rgba(31, 35, 45, .07);
    }

    .certificate {
      padding: clamp(22px, 4vw, 42px);
      border-radius: 28px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.96), rgba(244,237,255,.9)),
        #fff;
      border: 3px solid rgba(255, 214, 10, .85);
      box-shadow: 0 24px 70px rgba(31, 35, 45, .14);
      text-align: center;
    }

    .certificate-title {
      font-size: clamp(34px, 6vw, 72px);
      font-weight: 900;
      line-height: 1;
    }

    .floating-assistant {
      position: fixed;
      right: clamp(12px, 2vw, 28px);
      bottom: clamp(12px, 2vw, 26px);
      z-index: 20;
      display: grid;
      grid-template-columns: minmax(190px, 270px) 82px;
      grid-template-areas:
        "bubble avatar"
        "actions avatar";
      gap: 10px 12px;
      align-items: end;
      pointer-events: none;
    }

    .assistant-bubble {
      grid-area: bubble;
      padding: 14px 16px;
      border-radius: 20px;
      background: rgba(255,255,255,.9);
      border: 1px solid var(--line);
      box-shadow: 0 18px 45px rgba(31, 35, 45, .14);
      color: var(--ink);
      font-size: 18px;
      font-weight: 800;
      line-height: 1.25;
      pointer-events: auto;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .assistant-bubble .bubble-en {
      display: block;
    }

    .assistant-bubble .bubble-es {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: .88em;
      font-weight: 800;
    }

    .assistant-actions {
      grid-area: actions;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      pointer-events: auto;
    }

    .assistant-repeat,
    .assistant-hide {
      min-height: 42px;
      padding: 8px 12px;
      border-radius: 14px;
      background: rgba(234, 244, 255, .96);
      border: 1px solid var(--line);
      color: var(--ink);
      font-weight: 900;
      box-shadow: 0 8px 20px rgba(31, 35, 45, .08);
    }

    .assistant-avatar-button {
      grid-area: avatar;
      width: 82px;
      aspect-ratio: 1;
      border-radius: 24px;
      overflow: hidden;
      border: 3px solid rgba(255,255,255,.9);
      box-shadow: 0 18px 45px rgba(31, 35, 45, .2);
      background: #fff;
      pointer-events: auto;
    }

    .assistant-avatar-button img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .floating-assistant.collapsed {
      grid-template-columns: 82px;
      grid-template-areas: "avatar";
    }

    .floating-assistant.collapsed .assistant-bubble,
    .floating-assistant.collapsed .assistant-actions {
      display: none;
    }

    .select-highlight {
      width: 100%;
      min-height: 104px;
      margin-top: 12px;
      font-size: clamp(24px, 3vw, 40px);
    }

    .conversation-layout {
      display: grid;
      grid-template-columns: .88fr 1.12fr;
      gap: 18px;
    }

    .scene {
      min-height: 360px;
      display: grid;
      place-items: center;
      text-align: center;
      background: linear-gradient(145deg, rgba(255,255,255,.96), rgba(242,248,255,.9));
    }

    .scene-emoji {
      font-size: clamp(92px, 14vw, 180px);
      line-height: 1;
      margin-bottom: 12px;
    }

    .ai-line {
      background: var(--soft-blue);
      border: 1px solid #bdd5f2;
      padding: 18px;
      border-radius: 20px;
      font-size: clamp(26px, 3.4vw, 42px);
      font-weight: 900;
      line-height: 1.14;
    }

    .stars {
      font-size: clamp(54px, 10vw, 116px);
      line-height: 1;
      text-align: center;
      margin: 20px 0;
    }

    .progressbar {
      height: 26px;
      background: #e7eef8;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line);
      min-width: min(100%, 360px);
    }

    .progressbar span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--green), var(--blue));
      border-radius: inherit;
      transition: width .25s ease;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-weight: 800;
      font-size: 18px;
    }

    input, textarea, select {
      width: 100%;
      min-height: 56px;
      border: 2px solid var(--line);
      border-radius: 16px;
      padding: 12px 14px;
      background: #fff;
      color: var(--ink);
      font-size: 19px;
    }

    textarea { min-height: 110px; resize: vertical; }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 76px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      font-size: 20px;
      font-weight: 900;
    }

    .switch-row input {
      width: 30px;
      height: 30px;
      min-height: 30px;
      flex: 0 0 auto;
    }

    .high-contrast {
      --bg: #f8fbff;
      --panel: #ffffff;
      --ink: #071421;
      --muted: #253548;
      --line: #35475b;
      --soft-blue: #d3e8ff;
      --soft-green: #d5f2e4;
      --soft-lila: #e2d9ff;
    }

    .extra-large {
      --button-min: 96px;
    }

    .status {
      min-height: 42px;
      color: var(--muted);
      font-size: 18px;
      font-weight: 800;
    }

    @media (max-width: 820px) {
      .app { padding: 12px; }
      header { align-items: flex-start; }
      .hero, .conversation-layout { grid-template-columns: 1fr; }
      .assistant-card { min-height: 280px; }
      .grid.two, .grid.three { grid-template-columns: 1fr; }
      .top-actions { width: 100%; justify-content: stretch; }
      .top-actions .btn.small { flex: 1 1 130px; }
      .activity-head { flex-direction: column; }
      .choice { min-height: 96px; }
      .floating-assistant {
        grid-template-columns: minmax(160px, 1fr) 70px;
        left: 12px;
        right: 12px;
      }
      .assistant-avatar-button { width: 70px; border-radius: 20px; }
      .assistant-bubble { font-size: 16px; }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <header>
      <div class="brand">
        <div class="avatar" aria-hidden="true"><img src="assets/avatar.png" alt=""></div>
        <div>
          <strong>Hello Lizeth.ai</strong>
          <p class="subtitle">Your English friend</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="btn small secondary" data-go="home">Home</button>

    function refreshVoices() {
      if (!("speechSynthesis" in window)) return [];
      availableVoices = window.speechSynthesis.getVoices() || [];
      return availableVoices;
    }

    function voiceLabel(voice) {
      return `${voice.name} (${voice.lang})${voice.localService ? "" : " online"}`;
    }

    function findVoice(savedName, lang) {
      refreshVoices();
      if (!availableVoices.length) return null;
      if (savedName) {
        const saved = availableVoices.find(voice => voice.name === savedName);
        if (saved) return saved;
      }

      const languageVoices = availableVoices.filter(voice => voice.lang.toLowerCase().startsWith(lang.toLowerCase().slice(0, 2)));
      const scored = languageVoices.map(voice => {
        const name = voice.name.toLowerCase();
        const voiceLang = voice.lang.toLowerCase();
        let score = 0;

        if (lang.toLowerCase().startsWith("es")) {
          if (voiceLang === "es-us") score += 80;
          if (voiceLang === "es-mx") score += 75;
          if (voiceLang === "es-co") score += 70;
          if (voiceLang === "es-419") score += 70;
          if (voiceLang.startsWith("es-")) score += 25;
          if (name.includes("sabina") || name.includes("dalia") || name.includes("paulina") || name.includes("paloma") || name.includes("maria")) score += 35;
          if (name.includes("google")) score += 18;
          if (name.includes("microsoft")) score += 12;
          if (voiceLang === "es-es" || name.includes("spain") || name.includes("españa")) score -= 35;
        } else {
          if (name.includes("google us english")) score += 60;
          if (name.includes("jenny") || name.includes("aria") || name.includes("zira")) score += 40;
          if (voiceLang === "en-us") score += 30;
          if (name.includes("google")) score += 15;
          if (name.includes("microsoft")) score += 10;
        }

        if (voice.default) score += 4;
        return { voice, score };
      }).sort((a, b) => b.score - a.score);

      return (scored[0] && scored[0].voice) || languageVoices[0] || null;
    }

    function makeUtterance(text, lang, savedVoice, rate) {
      const utterance = new SpeechSynthesisUtterance(text);
      const voice = findVoice(savedVoice, lang);
      utterance.lang = voice ? voice.lang : lang;
      utterance.voice = voice;
      utterance.rate = Number(rate) || 0.75;
      utterance.pitch = Number(settings.voicePitch) || 1;
      utterance.volume = 0.92;
      return utterance;
    }

    async function playRecordedAudio(src) {
      if (!settings.recordedVoice || !src) return false;
      try {
        if ("speechSynthesis" in window) window.speechSynthesis.cancel();
        const audio = new Audio(src);
        audio.preload = "auto";
        await audio.play();
        await new Promise(resolve => {
          audio.onended = resolve;
          audio.onerror = resolve;
        });
        return true;
      } catch (error) {
        return false;
      }
    }

    function recordedSource(text, language) {
      const library = recordedAudio[language] || {};
      return library[normalize(text)] || "";
    }

    async function speak(text, lang, rate, savedVoice) {
      if (!settings.autoVoice) return;
      const language = lang.toLowerCase().startsWith("es") ? "es" : "en";
      if (await playRecordedAudio(recordedSource(text, language))) return;
      if (!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const utterance = makeUtterance(text, lang, savedVoice, rate);
      window.speechSynthesis.speak(utterance);
    }

    function speakEnglish(text) {
      speak(text, "en-US", settings.englishRate, settings.englishVoice);
    }

    function speakSpanish(text) {
      speak(text, "es-CO", settings.spanishRate, settings.spanishVoice);
    }

    async function speakAssistant(textEnglish, textSpanish) {
      if (!settings.autoVoice) return;
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      const playedEnglish = await playRecordedAudio(recordedSource(textEnglish, "en"));
      const playedSpanish = await playRecordedAudio(recordedSource(textSpanish, "es"));
      if (playedEnglish || playedSpanish) {
        if (!playedEnglish) speakEnglish(textEnglish);
        if (!playedSpanish) speakSpanish(textSpanish);
        return;
      }
      if (!("speechSynthesis" in window)) return;
      const first = makeUtterance(textEnglish, "en-US", settings.englishVoice, settings.englishRate);
      const second = makeUtterance(textSpanish, "es-CO", settings.spanishVoice, settings.spanishRate);
      first.onend = () => window.speechSynthesis.speak(second);
      window.speechSynthesis.speak(first);
    }

      const activities = totalActivities ? progress.greetingActivityDone.length / totalActivities : 0;
      return Math.round(((greetings + practice + conv + activities) / 4) * 100);

      const seen = content.colors.length ? progress.colorsSeen.length / content.colors.length : 0;

    function attachSentenceBuilder(activity) {
      const slots = Array.from(document.querySelectorAll("#sentenceSlots .sentence-slot"));
      const chips = Array.from(document.querySelectorAll("#wordBank .word-chip"));
      const selected = [];

      chips.forEach(chip => {
        chip.addEventListener("click", () => {
          if (selected.length >= slots.length) return;
          selected.push(chip.dataset.word);
          slots[selected.length - 1].textContent = chip.dataset.word;
          chip.classList.add("used");
          speakEnglish(chip.dataset.word);
        });
      });

      document.getElementById("clearSentence").addEventListener("click", () => {
        selected.splice(0, selected.length);
        slots.forEach(slot => { slot.textContent = "?"; slot.classList.remove("correct-choice", "incorrect-choice"); });
        chips.forEach(chip => chip.classList.remove("used"));
        document.getElementById("activityFeedback").textContent = "";
      });

      document.getElementById("checkSentence").addEventListener("click", () => {
        const expected = activity.answerWords.map(personalize);
        const ok = selected.length === expected.length && selected.every((word, index) => isMatch(word, expected[index]));
        slots.forEach(slot => slot.classList.add(ok ? "correct-choice" : "incorrect-choice"));
        if (ok) {
          addUnique(progress.greetingActivityDone, activity.id);
          awardStars(1, "activity", activity.id);
          save(STORE_KEYS.progress, progress);
          const msg = `${randomPersonal(positive)} ${completionComment()}`;
          document.getElementById("activityFeedback").textContent = msg;
          speakEnglish(msg);
        } else {
          const msg = "Try again, you can do it.";
          document.getElementById("activityFeedback").textContent = msg;
          speakEnglish(msg);
        }
      });
    }

    function getConversationExpected(turn) {
      return [turn.answer || (turn.answers && turn.answers[0]) || ""].filter(Boolean);
    }

    function getConversationOptions(turn) {
      if (turn.options && turn.options.length) return turn.options.map(personalize);
      const expected = personalize(getConversationExpected(turn)[0] || "");
      const distractors = [
        "Good night.",
        "Good morning.",
        "Goodbye.",
        "Hello.",
        "I am fine.",
        "Thank you.",
        "No.",
        "Yes.",
        "See you.",
        "I am sad.",
        "I am happy."
      ].filter(option => !isMatch(option, expected));
      const selected = [expected];
      for (const option of distractors) {
        if (selected.length >= 3) break;
        if (!selected.some(existing => isMatch(existing, option))) selected.push(option);
      }
      return stableShuffle(selected, expected);
    }

    function stableShuffle(options, seed) {
      const copy = [...options];
      let value = 0;
      String(seed || "").split("").forEach(char => { value += char.charCodeAt(0); });
      for (let index = copy.length - 1; index > 0; index--) {
        const swapIndex = value % (index + 1);
        const temp = copy[index];
        copy[index] = copy[swapIndex];
        copy[swapIndex] = temp;
        value = Math.floor(value / 2) + 7;
      }
      return copy;
    }

    function attachVoiceRecorder(id) {
      const box = document.getElementById(id);
      if (!box) return;
      const startBtn = box.querySelector("[data-record-start]");
      const stopBtn = box.querySelector("[data-record-stop]");
      const playBtn = box.querySelector("[data-record-play]");
      const status = box.querySelector("[data-record-status]");

      startBtn.addEventListener("click", async () => {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !window.MediaRecorder) {
          status.textContent = "Recording is not available in this browser. You can still use big buttons.";
          speakEnglish("Recording is not available in this browser. You can still use big buttons.");
          return;
        }

        try {
          stopCurrentRecording();
          recorderChunks = [];
          recorderStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          recorder = new MediaRecorder(recorderStream);
          recorder.ondataavailable = event => {
            if (event.data && event.data.size > 0) recorderChunks.push(event.data);
          };
          recorder.onstop = () => {
            const blob = new Blob(recorderChunks, { type: recorder.mimeType || "audio/webm" });
            if (recordedVoiceUrl) URL.revokeObjectURL(recordedVoiceUrl);
            recordedVoiceUrl = URL.createObjectURL(blob);
            playBtn.disabled = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
            status.textContent = "Recording ready. You can play your voice.";
            stopRecorderStream();
          };
          recorder.start();
          startBtn.disabled = true;
          stopBtn.disabled = false;
          playBtn.disabled = true;
          status.textContent = "Recording... speak now.";
        } catch (error) {
          status.textContent = "Microphone permission is needed to record. You can use big buttons.";
          speakEnglish("Microphone permission is needed to record. You can use big buttons.");
          startBtn.disabled = false;
          stopBtn.disabled = true;
        }
      });

      stopBtn.addEventListener("click", () => {
        if (recorder && recorder.state === "recording") {
          recorder.stop();
          status.textContent = "Saving your recording...";
        }
      });

      playBtn.addEventListener("click", async () => {
        if (!recordedVoiceUrl) return;
        try {
          if ("speechSynthesis" in window) window.speechSynthesis.cancel();
          const audio = new Audio(recordedVoiceUrl);
          status.textContent = "Playing your voice.";
          await audio.play();
          audio.onended = () => {
            status.textContent = "You can record again whenever you want.";
          };
        } catch (error) {
          status.textContent = "I could not play the recording. Try recording again.";
        }
      });
    }

    function stopCurrentRecording() {
      if (recorder && recorder.state === "recording") recorder.stop();
      stopRecorderStream();
    }

    function stopRecorderStream() {
      if (recorderStream) {
        recorderStream.getTracks().forEach(track => track.stop());
        recorderStream = null;
      }
    }

    }

    function advanceScan() {
      currentChoices.forEach(btn => btn.classList.remove("scan-highlight"));
      scanIndex = (scanIndex + 1) % currentChoices.length;
      currentChoices[scanIndex].classList.add("scan-highlight");
      speakEnglish(currentChoices[scanIndex].dataset.answer || currentChoices[scanIndex].textContent);
    }

    function stopScan() {
      if (scanTimer) clearInterval(scanTimer);
      scanTimer = null;
      currentChoices.forEach(btn => btn.classList.remove("scan-highlight"));
    }

    function selectHighlighted() {
      if (!currentChoices.length || scanIndex < 0 || !currentChoiceHandler) return;
      const selected = currentChoices[scanIndex];
      currentChoiceHandler(selected.dataset.answer || selected.textContent, selected);
    }

    function renderAccessibility() {
      refreshVoices();
      const englishVoices = availableVoices.filter(voice => voice.lang.toLowerCase().startsWith("en"));
      const spanishVoices = availableVoices.filter(voice => voice.lang.toLowerCase().startsWith("es"));
      const englishChoice = settings.englishVoice || (findVoice("", "en-US") || {}).name || "";
      const spanishChoice = settings.spanishVoice || (findVoice("", "es-CO") || {}).name || "";
      const voiceOptions = (voices, selected) => `
        <option value="">Best available voice</option>
        ${voices.map(voice => `<option value="${escapeAttr(voice.name)}" ${voice.name === selected ? "selected" : ""}>${escapeHtml(voiceLabel(voice))}</option>`).join("")}
      `;
      document.getElementById("accessibility").innerHTML = `
        <div class="panel stack">
          <div>
            <span class="badge">Accessibility Settings</span>
            <h2>Comfort settings</h2>
            <p class="subtitle">These settings are saved on this device.</p>
          </div>
          <div class="settings-grid">
            <label class="switch-row">Auto Scan <input type="checkbox" id="setAutoScan" ${settings.autoScan ? "checked" : ""}></label>
            <label class="switch-row">Automatic voice <input type="checkbox" id="setAutoVoice" ${settings.autoVoice ? "checked" : ""}></label>
            <label>Scan speed
              <select id="setScanSpeed">
                <option value="slow" ${settings.scanSpeed === "slow" ? "selected" : ""}>Slow</option>
                <option value="medium" ${settings.scanSpeed === "medium" ? "selected" : ""}>Medium</option>
                <option value="fast" ${settings.scanSpeed === "fast" ? "selected" : ""}>Fast</option>
              </select>
            </label>
            <label>Button size
              <select id="setButtonSize">
                <option value="large" ${settings.buttonSize === "large" ? "selected" : ""}>Large</option>
                <option value="extra-large" ${settings.buttonSize === "extra-large" ? "selected" : ""}>Extra large</option>
              </select>
            </label>
            <label>Contrast
              <select id="setContrast">
                <option value="normal" ${settings.contrast === "normal" ? "selected" : ""}>Normal</option>
                <option value="high" ${settings.contrast === "high" ? "selected" : ""}>High contrast</option>
              </select>
            </label>
            <label>Support language
              <select id="setLanguage">
                <option value="spanish" selected>Spanish</option>
              </select>
            </label>
            <label>English voice
              <select id="setEnglishVoice">
                ${voiceOptions(englishVoices, englishChoice)}
              </select>
            </label>
            <label>Spanish voice
              <select id="setSpanishVoice">
                ${voiceOptions(spanishVoices, spanishChoice)}
              </select>
            </label>
            <label>English speed
              <input type="range" id="setEnglishRate" min="0.55" max="1" step="0.05" value="${Number(settings.englishRate) || 0.7}">
            </label>
            <label>Spanish speed
              <input type="range" id="setSpanishRate" min="0.6" max="1.05" step="0.05" value="${Number(settings.spanishRate) || 0.82}">
            </label>
            <label>Voice tone
              <input type="range" id="setVoicePitch" min="0.85" max="1.15" step="0.05" value="${Number(settings.voicePitch) || 1}">
            </label>
          </div>
          <div class="grid three">
            <button class="btn lila" id="testVoice">Test voice</button>
            <button class="btn green" id="saveSettings">Save settings</button>
            <button class="btn secondary" data-go="home">Back home</button>
          </div>
          <p class="status" id="settingsStatus"></p>
        </div>
      `;
      document.getElementById("testVoice").addEventListener("click", () => {
        previewVoiceSettings();
      });
      document.getElementById("saveSettings").addEventListener("click", () => {
        settings = {
          autoScan: document.getElementById("setAutoScan").checked,
          autoVoice: document.getElementById("setAutoVoice").checked,
          recordedVoice: false,
          scanSpeed: document.getElementById("setScanSpeed").value,
          buttonSize: document.getElementById("setButtonSize").value,
          contrast: document.getElementById("setContrast").value,
          supportLanguage: "spanish",
          englishVoice: document.getElementById("setEnglishVoice").value,
          spanishVoice: document.getElementById("setSpanishVoice").value,
          englishRate: Number(document.getElementById("setEnglishRate").value),
          spanishRate: Number(document.getElementById("setSpanishRate").value),
          voicePitch: Number(document.getElementById("setVoicePitch").value)
        };
        save(STORE_KEYS.settings, settings);
        applySettings();
        document.getElementById("settingsStatus").textContent = "Settings saved.";
        speakEnglish("Settings saved.");
      });
    }

    function previewVoiceSettings() {
      const previous = { ...settings };
      settings = {
        ...settings,
        autoVoice: true,
        recordedVoice: false,
        englishVoice: document.getElementById("setEnglishVoice").value,
        spanishVoice: document.getElementById("setSpanishVoice").value,
        englishRate: Number(document.getElementById("setEnglishRate").value),
        spanishRate: Number(document.getElementById("setSpanishRate").value),
        voicePitch: Number(document.getElementById("setVoicePitch").value)
      };
      document.getElementById("settingsStatus").textContent = "Testing voice...";
      speakAssistant(`Hello ${studentName()}. I am your English friend.`, `Hola ${studentName()}. Estoy lista para aprender contigo.`);
      settings = previous;
    }

    function setupVoiceLoading() {
      if (!("speechSynthesis" in window)) return;
      refreshVoices();
      window.speechSynthesis.onvoiceschanged = () => {
        refreshVoices();
        if (document.getElementById("accessibility").classList.contains("active")) {
          renderAccessibility();
        }
      };
      setTimeout(refreshVoices, 500);
      setTimeout(refreshVoices, 1200);
    }

    function renderTeacher() {
      const first = content.practiceQuestions[0];
      document.getElementById("teacher").innerHTML = `
        <div class="panel stack">
          <div>
            <span class="badge">Teacher Mode</span>
            <h2>Content and progress</h2>
            <p class="subtitle">Changes are saved on this device.</p>
          </div>
          <label>Main video link
            <input id="teacherVideo" value="${escapeAttr(content.videoUrl)}">
          </label>
          <div class="grid two">
            <label>Practice question
              <textarea id="teacherQuestion">${escapeHtml(first.q)}</textarea>
            </label>
            <label>Options, one per line
              <textarea id="teacherOptions">${escapeHtml(first.options.join("\n"))}</textarea>
            </label>
          </div>
          <label>Correct answer
            <input id="teacherAnswer" value="${escapeAttr(first.answer)}">
          </label>
          <div class="grid two">
            <label>New greeting in English
              <input id="newGreetingEn" placeholder="Example: Thank you">
            </label>
            <label>Spanish meaning
              <input id="newGreetingEs" placeholder="Example: Gracias">
            </label>
          </div>
          <div class="grid three">
            <button class="btn green" id="saveTeacher">Save changes</button>
            <button class="btn lila" id="addGreeting">Add greeting</button>
            <button class="btn yellow" id="resetProgress">Reset progress</button>
          </div>
          <p class="status" id="teacherStatus"></p>
          <button class="btn secondary" data-go="home">Back home</button>
        </div>
      `;
      document.getElementById("saveTeacher").addEventListener("click", () => {
        const options = document.getElementById("teacherOptions").value.split("\n").map(x => x.trim()).filter(Boolean);
        content.videoUrl = toEmbedUrl(document.getElementById("teacherVideo").value.trim());
        content.practiceQuestions[0] = {
          q: document.getElementById("teacherQuestion").value.trim() || first.q,
          options: options.length ? options : first.options,
          answer: document.getElementById("teacherAnswer").value.trim() || first.answer
        };
        save(STORE_KEYS.content, content);
        document.getElementById("teacherStatus").textContent = "Changes saved.";
        speakEnglish("Changes saved.");
      });
      document.getElementById("addGreeting").addEventListener("click", () => {
        const en = document.getElementById("newGreetingEn").value.trim();
        const es = document.getElementById("newGreetingEs").value.trim();
        if (!en || !es) {
          document.getElementById("teacherStatus").textContent = "Please write the greeting and the meaning.";
          return;
        }
        content.greetings.push({ en, es });
        save(STORE_KEYS.content, content);
        document.getElementById("teacherStatus").textContent = "Greeting added.";
        speakEnglish("Greeting added.");
      });
      document.getElementById("resetProgress").addEventListener("click", () => {
        progress = deepCopy(defaultProgress);
        save(STORE_KEYS.progress, progress);
        document.getElementById("teacherStatus").textContent = "Progress reset.";
        speakEnglish("Progress reset.");
      });
    }

    function listenForVoice(callback, statusId) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const status = document.getElementById(statusId);
      if (!SpeechRecognition) {
        status.textContent = "Voice mode is not available in this browser. You can use big buttons.";
        speakEnglish("Voice mode is not available in this browser. You can use big buttons.");
        return;
      }
      try {
        if (recognition) recognition.stop();
        recognition = new SpeechRecognition();
        recognition.lang = "en-US";
        recognition.interimResults = false;
        recognition.maxAlternatives = 3;
        status.textContent = "Listening...";
        recognition.onresult = event => {
          const heard = Array.from(event.results[0]).map(result => result.transcript).join(" ");
          status.textContent = "I heard: " + heard;
          callback(heard);
        };
        recognition.onerror = () => {
          status.textContent = "That's okay. You can use big buttons.";
          speakEnglish("That's okay. You can use big buttons.");
        };
        recognition.start();
      } catch (error) {
        status.textContent = "Voice mode is not available in this browser. You can use big buttons.";
      }
    }

    function isMatch(value, expected) {
      const cleanValue = normalize(decodeHtml(value));
      const cleanExpected = normalize(decodeHtml(expected));
      if (cleanValue === cleanExpected) return true;
      return cleanValue.includes(cleanExpected) || cleanExpected.includes(cleanValue);
    }

    function decodeHtml(value) {
      const text = String(value || "");
      if (!text.includes("&")) return text;
      const textarea = document.createElement("textarea");
      textarea.innerHTML = text;
      return textarea.value;
    }

    function normalize(text) {
      return String(text || "")
        .toLowerCase()
        .replace(/[.,!?]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function addUnique(list, value) {
      if (!list.includes(value)) list.push(value);
    }

    function random(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function randomPersonal(list) {
      return personalize(random(list));
    }

    function awardStars(amount, type, id) {
      if (!id) {
        sessionMemory.stars += amount;
        return;
      }
      const bucket = type === "mission" ? sessionMemory.completedMissions : sessionMemory.completedActivities;
      if (!bucket.has(id)) {
        bucket.add(id);
        sessionMemory.stars += amount;
      }
    }

    function sessionSummaryText() {
      const activities = sessionMemory.completedActivities.size;
      const missions = sessionMemory.completedMissions.size;
      const stars = sessionMemory.stars;
      const parts = [];
      if (activities) parts.push(`You completed ${activities} greeting ${activities === 1 ? "activity" : "activities"} today.`);
      if (missions) parts.push(`You completed ${missions} greeting ${missions === 1 ? "mission" : "missions"} today.`);
      if (stars) parts.push(`You have earned ${stars} ${stars === 1 ? "star" : "stars"}.`);
      return parts.join(" ");
    }

    function activityIntro(activity, group) {
      const intros = {
        speaking: [
          `Hello ${studentName()}! Let's practice greetings together.`,
          "Mission: Speaking with your English friend.",
          "Let's say these greetings slowly and clearly.",
          "Ready for a speaking game?"
        ],
        reading: [
          "Let's play a reading game.",
          "Mission: Find the greeting.",
          "Read slowly. I will help you.",
          "Let's look carefully at the words."
        ],
        listening: [
          "Are you ready for a listening challenge?",
          "Mission: Listen and choose.",
          "Listen carefully. No rush.",
          "Let's hear the English words together."
        ]
      };
      const chosen = random(intros[group] || ["Let's practice together."]);
      return `${chosen} ${activity.title}.`;
    }

    function activitySpanishHelp(group) {
      if (group === "speaking") return "Apoyo: escucha la frase en ingles, intenta decirla y puedes grabarte para escucharte.";
      if (group === "reading") return "Apoyo: mira las palabras o imagenes con calma y toca la respuesta.";
      if (group === "listening") return "Apoyo: escucha primero, luego elige lo que escuchaste. Puedes repetir.";
      return "Apoyo: vamos paso a paso, sin afan.";
    }

    function completionComment() {
      const summary = sessionSummaryText();
      return `${randomPersonal(activityComments)}${summary ? " " + summary : ""}`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("\n", " ");
    }

    function toEmbedUrl(url) {
      if (!url) return defaultContent.videoUrl;
      try {
        const embeddedId = getYouTubeId(url);
        if (embeddedId) return "https://www.youtube-nocookie.com/embed/" + encodeURIComponent(embeddedId) + "?rel=0&playsinline=1";
        const parsed = new URL(url);
        const id = parsed.searchParams.get("v");
        if (id) return "https://www.youtube-nocookie.com/embed/" + encodeURIComponent(id) + "?rel=0&playsinline=1";
      } catch (error) {}
      return url;
    }

    function getYouTubeId(url) {
      try {
        const parsed = new URL(url);
        if (parsed.hostname.includes("youtu.be")) {
          return parsed.pathname.split("/").filter(Boolean)[0] || "";
        }
        if (parsed.pathname.includes("/embed/")) {
          return parsed.pathname.split("/embed/")[1].split("/")[0] || "";
        }
        return parsed.searchParams.get("v") || "";
      } catch (error) {
        return "";
      }
    }

    function applySettings() {
      document.body.classList.toggle("high-contrast", settings.contrast === "high");
      document.body.classList.toggle("extra-large", settings.buttonSize === "extra-large");
    }

    document.addEventListener("click", event => {
      const target = event.target.closest("[data-go]");
      if (target) show(target.dataset.go);
    });

    document.getElementById("startBtn").addEventListener("click", () => {
      if (!profile.studentName) show("profile");
      else show("topic");
    });
    document.getElementById("continueBtn").addEventListener("click", () => {
      if (!profile.studentName) show("profile");
      else show(progress.lastModule || "topic");
    });
    document.getElementById("assistantRepeat").addEventListener("click", () => {
      speakAssistant(assistantMessage.en, assistantMessage.es);
    });
    document.getElementById("assistantHide").addEventListener("click", () => {
      document.getElementById("floatingAssistant").classList.add("collapsed");
    });
    document.getElementById("assistantAvatarButton").addEventListener("click", () => {
      const assistant = document.getElementById("floatingAssistant");
      assistant.classList.toggle("collapsed");
      if (!assistant.classList.contains("collapsed")) {
        speakAssistant(assistantMessage.en, assistantMessage.es);
      }
    });

    applySettings();
    setupVoiceLoading();
    refreshStudentName();
    updateAssistantForScreen("home");
    if (!profile.studentName) {
      setTimeout(() => show("profile"), 500);
    }
    setTimeout(() => {
      speakAssistant(`Hello ${studentName()}! I am ready to learn with you.`, `Hola ${studentName()}, estoy lista para aprender contigo.`);
    }, 650);
  </script>
</body>
